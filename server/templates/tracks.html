<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轨迹回放</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h1 { color: #333; margin-bottom: 20px; }
        .nav { background: white; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
        .nav a { display: inline-block; padding: 8px 16px; background: #f0f0f0; color: #333; border-radius: 4px; text-decoration: none; }
        .nav a:hover { background: #1890ff; color: white; }
        .nav a.active { background: #1890ff; color: white; }
        .layout { display: flex; gap: 20px; }
        .sidebar { width: 320px; background: white; border-radius: 12px; padding: 16px; box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08); }
        .sidebar h3 { margin-bottom: 12px; color: #333; }
        .track-filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; align-items: center; }
        .track-filters select, .track-filters input, .track-filters button { width: 100%; padding: 7px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
        .track-filters button { background: #1890ff; color: #fff; border: none; cursor: pointer; }
        .track-filters .reset-btn { background: #f5f5f5; color: #333; border: 1px solid #ddd; }
        .track-pagination { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; gap: 8px; }
        .track-pagination button { padding: 6px 10px; border: 1px solid #ddd; background: #fff; border-radius: 4px; cursor: pointer; }
        .track-pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .track-page-info { font-size: 12px; color: #666; }
        .track-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .track-item:hover { background: #f5f5f5; }
        .track-item.active { background: #e6f7ff; }
        .track-item .date { font-weight: 600; color: #333; }
        .track-item .stats { font-size: 12px; color: #666; margin-top: 4px; }
        .map-container { flex: 1; background: white; border-radius: 12px; box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08); overflow: hidden; }
        #map { width: 100%; height: 500px; }
        .info-panel { margin-top: 16px; padding: 16px; background: #f8f9fa; border-radius: 8px; }
        .info-panel h4 { margin-bottom: 8px; }
        .info-panel p { margin-bottom: 4px; font-size: 14px; color: #666; }
        .controls { margin-top: 16px; }
        .controls button { padding: 8px 16px; margin-right: 8px; background: #1890ff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .controls button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>轨迹回放</h1>
        <div class="nav">
            <a href="/">审核后台</a>
            <a href="/users.html">用户管理</a>
            <a href="/tracks.html" class="active">轨迹回放</a>
            <a href="/reports.html">统计报表</a>
        </div>

        <div class="layout">
            <div class="sidebar">
                <h3>巡查记录</h3>
                <div class="track-filters">
                    <select id="trackUserFilter">
                        <option value="">全部用户</option>
                    </select>
                    <input type="date" id="trackDateFilter">
                    <button onclick="loadTracks(1)">筛选</button>
                    <button class="reset-btn" onclick="resetTrackFilters()">重置</button>
                </div>
                <div id="trackList"></div>
                <div class="track-pagination">
                    <button id="trackPrevBtn" onclick="prevTrackPage()">上一页</button>
                    <span class="track-page-info" id="trackPageInfo">第 1/1 页</span>
                    <button id="trackNextBtn" onclick="nextTrackPage()">下一页</button>
                </div>
            </div>
            <div class="map-container">
                <div id="map"></div>
                <div class="info-panel" id="infoPanel" style="display:none;">
                    <h4>轨迹信息</h4>
                    <p id="trackInfo"></p>
                </div>
                <div class="controls" id="controls" style="display:none;">
                    <button onclick="startReplay()">开始回放</button>
                    <button onclick="stopReplay()">停止回放</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 高德地图JS API -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=2629109075a39a7cf567b3e150e08db4"></script>
    <script>
        const token = localStorage.getItem('admin_token');
        if (!token) {
            window.location.href = '/login.html';
        }

        let map = null;
        let polyline = null;
        let marker = null;
        let reportMarkers = [];
        let currentTrackId = null;
        let currentReplayPath = [];
        let replayIndex = 0;
        let replayTimer = null;
        let trackMetaMap = {};
        let currentTrackPage = 1;
        let totalTrackPages = 1;

        // 初始化地图（如果没有高德key，显示提示）
        function initMap() {
            try {
                map = new AMap.Map('map', {
                    zoom: 15,
                    center: [111.003, 35.026]  // 运城坐标
                });
            } catch (e) {
                document.getElementById('map').innerHTML = '<div style="padding:20px;color:#999;text-align:center;">请配置高德地图API Key<br>替换 YOUR_AMAP_KEY 为实际key</div>';
            }
        }

        async function loadTrackUsers() {
            const res = await fetch('/api/users', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) return;
            const users = await res.json();
            const select = document.getElementById('trackUserFilter');
            if (!select) return;
            const options = users
                .filter(u => u.role !== 'admin')
                .map(u => `<option value="${u.id}">${u.name || u.username}</option>`)
                .join('');
            select.innerHTML = `<option value="">全部用户</option>${options}`;
        }

        async function loadTracks(page = 1) {
            currentTrackPage = page;
            const userId = document.getElementById('trackUserFilter')?.value || '';
            const date = document.getElementById('trackDateFilter')?.value || '';
            const params = new URLSearchParams({
                page: String(page),
                page_size: '10'
            });
            if (userId) {
                params.append('user_id', userId);
            }
            if (date) {
                params.append('start_time', `${date}T00:00:00`);
                params.append('end_time', `${date}T23:59:59`);
            }
            const res = await fetch(`/api/tracks?${params.toString()}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) {
                if (res.status === 401 || res.status === 403) {
                    window.location.href = '/login.html';
                }
                return;
            }
            const data = await res.json();
            totalTrackPages = Math.max(1, Math.ceil((data.total || 0) / 10));
            trackMetaMap = {};
            data.items.forEach(item => {
                trackMetaMap[item.id] = item;
            });
            const listEl = document.getElementById('trackList');
            listEl.innerHTML = data.items.map(t => `
                <div class="track-item" onclick="loadTrack(${t.id}, this)">
                    <div class="date">${formatTime(t.start_time)}</div>
                    <div class="stats">${t.distance_km}km | ${t.duration_min}分钟 | ${t.user_name || '未知'}</div>
                </div>
            `).join('');
            if (data.items.length === 0) {
                listEl.innerHTML = '<div class="track-item">暂无巡查记录</div>';
            }
            const pageInfo = document.getElementById('trackPageInfo');
            if (pageInfo) {
                pageInfo.textContent = `第 ${currentTrackPage}/${totalTrackPages} 页`;
            }
            const prevBtn = document.getElementById('trackPrevBtn');
            const nextBtn = document.getElementById('trackNextBtn');
            if (prevBtn) prevBtn.disabled = currentTrackPage <= 1;
            if (nextBtn) nextBtn.disabled = currentTrackPage >= totalTrackPages;
        }

        function prevTrackPage() {
            if (currentTrackPage > 1) {
                loadTracks(currentTrackPage - 1);
            }
        }

        function nextTrackPage() {
            if (currentTrackPage < totalTrackPages) {
                loadTracks(currentTrackPage + 1);
            }
        }

        function resetTrackFilters() {
            const userFilter = document.getElementById('trackUserFilter');
            const dateFilter = document.getElementById('trackDateFilter');
            if (userFilter) userFilter.value = '';
            if (dateFilter) dateFilter.value = '';
            loadTracks(1);
        }

        function formatTime(t) {
            if (!t) return '-';
            const d = new Date(t);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        // 本地坐标转换：WGS84 -> GCJ-02，避免依赖高德在线转换接口失败
        function outOfChina(lng, lat) {
            return lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271;
        }

        function transformLat(x, y) {
            let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
            ret += (20.0 * Math.sin(6.0 * x * Math.PI) + 20.0 * Math.sin(2.0 * x * Math.PI)) * 2.0 / 3.0;
            ret += (20.0 * Math.sin(y * Math.PI) + 40.0 * Math.sin(y / 3.0 * Math.PI)) * 2.0 / 3.0;
            ret += (160.0 * Math.sin(y / 12.0 * Math.PI) + 320 * Math.sin(y * Math.PI / 30.0)) * 2.0 / 3.0;
            return ret;
        }

        function transformLng(x, y) {
            let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
            ret += (20.0 * Math.sin(6.0 * x * Math.PI) + 20.0 * Math.sin(2.0 * x * Math.PI)) * 2.0 / 3.0;
            ret += (20.0 * Math.sin(x * Math.PI) + 40.0 * Math.sin(x / 3.0 * Math.PI)) * 2.0 / 3.0;
            ret += (150.0 * Math.sin(x / 12.0 * Math.PI) + 300.0 * Math.sin(x / 30.0 * Math.PI)) * 2.0 / 3.0;
            return ret;
        }

        function wgs84ToGcj02(lng, lat) {
            if (outOfChina(lng, lat)) {
                return [lng, lat];
            }
            const a = 6378245.0;
            const ee = 0.00669342162296594323;
            let dLat = transformLat(lng - 105.0, lat - 35.0);
            let dLng = transformLng(lng - 105.0, lat - 35.0);
            const radLat = lat / 180.0 * Math.PI;
            let magic = Math.sin(radLat);
            magic = 1 - ee * magic * magic;
            const sqrtMagic = Math.sqrt(magic);
            dLat = (dLat * 180.0) / ((a * (1 - ee)) / (magic * sqrtMagic) * Math.PI);
            dLng = (dLng * 180.0) / (a / sqrtMagic * Math.cos(radLat) * Math.PI);
            const mgLat = lat + dLat;
            const mgLng = lng + dLng;
            return [mgLng, mgLat];
        }

        function convertGpsPathToGaode(path) {
            if (!path || path.length === 0) {
                return [];
            }
            return path.map(point => wgs84ToGcj02(point[0], point[1]));
        }

        function clearReportMarkers() {
            if (!map || !reportMarkers.length) return;
            map.remove(reportMarkers);
            reportMarkers = [];
        }

        async function loadReportMarkersForTrack(trackId) {
            const meta = trackMetaMap[trackId];
            if (!meta || !meta.user_id || !meta.start_time || !meta.end_time) {
                return 0;
            }
            const params = new URLSearchParams({
                user_id: String(meta.user_id),
                page: '1',
                page_size: '200',
                time_field: 'create',
                start_time: meta.start_time,
                end_time: meta.end_time
            });
            const res = await fetch(`/api/reports?${params.toString()}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) {
                return 0;
            }
            const data = await res.json();
            const items = Array.isArray(data.items) ? data.items : [];
            clearReportMarkers();
            const markers = [];
            for (const item of items) {
                if (typeof item.longitude !== 'number' || typeof item.latitude !== 'number') {
                    continue;
                }
                const [lng, lat] = wgs84ToGcj02(item.longitude, item.latitude);
                const m = new AMap.Marker({
                    position: [lng, lat],
                    title: item.problem_type || '上报点',
                    offset: new AMap.Pixel(-6, -6),
                    content: '<div style="width:12px;height:12px;border-radius:50%;background:#ff4d4f;border:2px solid #fff;box-shadow:0 0 2px rgba(0,0,0,0.4);"></div>'
                });
                markers.push(m);
            }
            if (markers.length > 0) {
                map.add(markers);
            }
            reportMarkers = markers;
            return markers.length;
        }

        async function loadTrack(id, clickedEl) {
            currentTrackId = id;
            const res = await fetch(`/api/tracks/${id}/points`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) {
                alert('获取轨迹点失败');
                return;
            }
            const data = await res.json();
            const points = data.points;

            // 高亮选中项
            document.querySelectorAll('.track-item').forEach(el => el.classList.remove('active'));
            if (clickedEl) {
                clickedEl.classList.add('active');
            }

            // 显示信息面板
            document.getElementById('infoPanel').style.display = 'block';
            document.getElementById('controls').style.display = 'block';
            document.getElementById('trackInfo').textContent = `共 ${points.length} 个轨迹点`;

            if (!points || points.length === 0) {
                alert('该轨迹没有可回放的坐标点');
                return;
            }

            if (!map) return;

            // 清除旧轨迹
            if (polyline) map.remove(polyline);
            if (marker) map.remove(marker);
            clearReportMarkers();

            // 绘制轨迹线（先做坐标系转换，避免在高德底图上出现偏移）
            const rawPath = points.map(p => [p.longitude, p.latitude]);
            const path = convertGpsPathToGaode(rawPath);
            currentReplayPath = path;
            polyline = new AMap.Polyline({
                path: path,
                strokeColor: '#1890ff',
                strokeWeight: 4,
                strokeOpacity: 0.8
            });
            map.add(polyline);

            // 创建移动标记
            marker = new AMap.Marker({
                position: path[0],
                icon: new AMap.Icon({
                    size: new AMap.Size(25, 34),
                    image: 'https://a.amap.com/jsapi_demos/static/demo-center/icons/poi-marker-red.png',
                    imageSize: new AMap.Size(25, 34)
                })
            });
            map.add(marker);

            // 设置视野
            map.setFitView([polyline]);

            const reportCount = await loadReportMarkersForTrack(id);

            replayIndex = 0;
            document.getElementById('trackInfo').textContent = `共 ${points.length} 个轨迹点，上报点 ${reportCount} 个`;
        }

        function startReplay() {
            if (!currentTrackId || !map || !marker) return;
            stopReplay();
            if (!currentReplayPath || currentReplayPath.length === 0) return;
            replayIndex = 0;
            replayTimer = setInterval(() => {
                if (replayIndex >= currentReplayPath.length) {
                    stopReplay();
                    return;
                }
                marker.setPosition(currentReplayPath[replayIndex]);
                replayIndex++;
            }, 500);  // 每0.5秒移动一个点
        }

        function stopReplay() {
            if (replayTimer) {
                clearInterval(replayTimer);
                replayTimer = null;
            }
        }

        initMap();
        loadTrackUsers();
        loadTracks(1);
    </script>
</body>
</html>
