<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 360px; }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 32px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #333; font-size: 14px; margin-bottom: 8px; }
        input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: #1890ff; }
        button { width: 100%; padding: 14px; background: #1890ff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #40a9ff; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error { color: #ff4d4f; text-align: center; margin-top: 16px; font-size: 14px; }
        .hint { color: #999; text-align: center; margin-top: 16px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>城市管理智能识别</h1>
        <p class="subtitle">管理员登录</p>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" id="loginBtn">登录</button>
        </form>
        <p class="error" id="errorMsg"></p>
        <p class="hint">默认账户: admin / admin123</p>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.textContent = '登录中...';
            errorMsg.textContent = '';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                if (!res.ok) {
                    errorMsg.textContent = data.detail || '登录失败';
                    btn.disabled = false;
                    btn.textContent = '登录';
                    return;
                }

                // 保存token
                localStorage.setItem('admin_token', data.token);
                localStorage.setItem('admin_user', JSON.stringify(data.user));

                // 跳转到审核后台
                window.location.href = '/';
            } catch (err) {
                errorMsg.textContent = '网络错误，请稍后重试';
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        // 检查是否已登录
        const token = localStorage.getItem('admin_token');
        if (token) {
            // 验证token有效性
            fetch('/api/users/me', {
                headers: { 'Authorization': 'Bearer ' + token }
            }).then(res => {
                if (res.ok) {
                    window.location.href = '/';
                } else {
                    localStorage.removeItem('admin_token');
                    localStorage.removeItem('admin_user');
                }
            });
        }
    </script>
</body>
</html>
